<body>

<h1>Salesforce Contact Migration</h1>
<p class="subtitle">Review and import contacts into AMQA Sensor Network Tracker</p>

<!-- Login -->
<div id="login-section">

  <button onclick="doLogin()">Sign In</button>
  <div id="login-error"></div>
</div>

<!-- Main review area (hidden until login) -->
<div id="main-area" style="display:none; width:100%; max-width:800px; display:flex; flex-direction:column; align-items:center;">
  <div id="main-area-inner" style="display:none; width:100%;">

    <!-- Filter -->
    <div class="filter-bar" id="filter-bar">
      <label>Jump to account:</label>
      <select id="account-filter" onchange="jumpToAccount()">
        <option value="">-- All (sequential) --</option>

    </div>

        <span id="progress-label">Contact 1 of 201</span>

      <div class="counter skipped"><div class="num" id="count-skipped">0</div><div class="label">Skipped</div></div>
      <div class="counter remaining"><div class="num" id="count-remaining">201</div><div class="label">Remaining</div></div>
    </div>

<!-- New Community Modal -->

</div>

<script>
// ===== SUPABASE SETUP =====
const SUPABASE_URL = 'https://uejryzioxogquflijgyf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlanJ5emlveG9ncXVmbGlqZ3lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTkyODMsImV4cCI6MjA4OTI3NTI4M30.YD349-X2PeoeCTVp34FbzdGwachr9YCpzIPSXuSURfM';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== DATA =====
let sfContacts = [];

// ===== COMMUNITY MAPPING =====
// Maps SF account names to app community IDs
const ACCOUNT_TO_COMMUNITY = {

function guessOrg(c) {
  // Try to figure out the org from SF data
  if (c.account_type === 'Tribe') return c.account_name;
  if (c.account_type === 'Sensor Manufacturer') return c.account_name;
  if (c.account_type === 'Other') return c.account_name;
  if (c.department) return c.department;
  // For community-type accounts, the org might be in title
  if (c.title && c.title.includes(' - ')) {
    const parts = c.title.split(' - ');
    if (parts.length > 1) return parts[0].trim();
  }
  return c.account_name || '';
}

function guessRole(c) {
  if (c.title) {
    // Clean up title - remove org prefix if present
    let role = c.title;
    if (role.includes(' - ') && c.account_name) {
      // If title is "Org - Role", extract role
      const parts = role.split(' - ');
      if (parts[0].trim() === c.account_name || parts.length > 1) {
        role = parts[parts.length - 1].trim();
      }
    }
    return role;
  }
  return '';
}

function guessPhone(c) {
  return c.phone || c.mobile || '';
}

function guessCommunity(c) {
  // Direct mapping
  if (ACCOUNT_TO_COMMUNITY[c.account_name] !== undefined) {
    return ACCOUNT_TO_COMMUNITY[c.account_name];
  }
  // Parent account mapping
  if (c.parent_account && ACCOUNT_TO_COMMUNITY[c.parent_account] !== undefined) {
    return ACCOUNT_TO_COMMUNITY[c.parent_account];
  }
  return '';
}

function getCommunityName(id) {
  const c = communities.find(x => x.id === id);
  return c ? c.name : id;
}

function checkDuplicate(contact) {
  const name = contact.name.toLowerCase().trim();
  const email = (contact.email || '').toLowerCase().trim();
  return existingContacts.filter(ec => {
    const eName = (ec.name || '').toLowerCase().trim();
    const eEmail = (ec.email || '').toLowerCase().trim();
    if (email && eEmail && email === eEmail) return true;
    if (name && eName && name === eName) return true;
    return false;
  });
}

// ===== LOGIN =====
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';

  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('main-area').style.display = 'flex';
    document.getElementById('main-area-inner').style.display = '';
    await loadData();
  } catch (err) {
    document.getElementById('login-error').textContent = err.message;
  }
}

// Allow Enter key on password field
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function loadData() {
  // Load communities
  const { data: comms, error: commErr } = await supa.from('communities').select('*').order('name');
  if (commErr) { showToast('Failed to load communities: ' + commErr.message, 'error'); return; }
  communities = comms || [];

  // Load existing contacts (for duplicate detection)
  const { data: contacts, error: contErr } = await supa.from('contacts').select('*');
  if (contErr) { showToast('Failed to load contacts: ' + contErr.message, 'error'); return; }
  existingContacts = contacts || [];

  // Populate account filter dropdown
  const accountFilter = document.getElementById('account-filter');
  const accountNames = [...new Set(sfContacts.map(c => c.account_name).filter(Boolean))].sort();
  accountNames.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = `${name} (${sfContacts.filter(c => c.account_name === name).length})`;
    accountFilter.appendChild(opt);
  });

  showContact(0);
}

// ===== RENDER =====
function showContact(index) {
  // Skip already-decided contacts when navigating
  while (index < sfContacts.length && decisions[sfContacts[index].sf_id]) {
    index++;
  }
  if (index >= sfContacts.length) {
    showDone();
    return;
  }
  currentIndex = index;
  const c = sfContacts[index];
  const communityId = guessCommunity(c);
  const org = guessOrg(c);
  const role = guessRole(c);
  const phone = guessPhone(c);
  const dups = checkDuplicate(c);

  const totalDecided = approved.length + skipped.length;
  const remaining = sfContacts.length - totalDecided;
  const pct = Math.round((totalDecided / sfContacts.length) * 100);

  document.getElementById('progress-label').textContent = `Contact ${totalDecided + 1} of ${sfContacts.length}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('count-approved').textContent = approved.length;
  document.getElementById('count-skipped').textContent = skipped.length;
  document.getElementById('count-remaining').textContent = remaining;

  let dupHtml = '';
  if (dups.length > 0) {
    dupHtml = `<div class="dup-warning">
      Possible duplicate${dups.length > 1 ? 's' : ''} already in app:
      ${dups.map(d => `<strong>${d.name}</strong> (${d.email || 'no email'}, ${getCommunityName(d.community_id)})`).join(', ')}
    </div>`;
  }

  const card = document.getElementById('review-card');
  card.innerHTML = `
    ${dupHtml}
    <div class="card-header">
      <h2>${c.name || '(No Name)'}</h2>
      <span class="sf-badge">SF: ${c.account_name || 'No Account'} (${c.account_type || 'N/A'})</span>
    </div>

    <div class="sf-data">
      <h3>Salesforce Data (read-only reference)</h3>
      <div class="sf-row"><span class="sf-label">Name:</span> <span class="sf-value">${c.name || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Email:</span> <span class="sf-value">${c.email || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Phone:</span> <span class="sf-value">${c.phone || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Mobile:</span> <span class="sf-value">${c.mobile || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Title:</span> <span class="sf-value">${c.title || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Department:</span> <span class="sf-value">${c.department || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Account:</span> <span class="sf-value">${c.account_name || '<em class="empty">empty</em>'} ${c.account_type ? '(' + c.account_type + ')' : ''}</span></div>
      <div class="sf-row"><span class="sf-label">Parent Account:</span> <span class="sf-value">${c.parent_account || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Mailing City:</span> <span class="sf-value">${c.mailing_city || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Email List:</span> <span class="sf-value">${c.include_email === '1' ? '<strong style="color:var(--green)">Yes</strong>' : c.include_email === '0' ? 'No' : '<em class="empty">not set</em>'}</span></div>
    </div>

    <div class="form-section">
      <h3>Data to Upload (edit as needed)</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="inp-name" value="${escHtml(c.name)}">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="inp-email" value="${escHtml(c.email)}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="inp-phone" value="${escHtml(phone)}">
        </div>
        <div class="form-group">
          <label>Organization</label>
          <input type="text" id="inp-org" value="${escHtml(org)}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Role / Title</label>
          <input type="text" id="inp-role" value="${escHtml(role)}">
        </div>
        <div class="form-group">
          <label>Community</label>
          <div style="display:flex;gap:8px;align-items:start;">
            <select id="inp-community" style="flex:1;">
              <option value="">-- No Community --</option>
              ${communities.map(cm => `<option value="${cm.id}" ${cm.id === communityId ? 'selected' : ''}>${cm.name}</option>`).join('')}
            </select>
            <button type="button" class="btn-add-community" onclick="openNewCommunityModal()" title="Add new community">+ New</button>
          </div>
          ${communityId ? `<div class="mapping-info">Auto-mapped from "${c.account_name}"</div>` : c.account_name ? `<div class="hint" style="color:var(--orange)">No auto-mapping for "${c.account_name}" - please select manually</div>` : ''}
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Active?</label>
          <div class="active-toggle">
            <label><input type="radio" name="active" value="true" checked> Active</label>
            <label><input type="radio" name="active" value="false"> Inactive</label>
          </div>
        </div>
        <div class="form-group">
          <label class="email-list-check">
            <input type="checkbox" id="inp-email-list" ${c.include_email === '1' ? 'checked' : ''}>
            Include on email list
          </label>
          ${c.include_email === '1' ? '<div class="mapping-info">Pre-checked from Salesforce data</div>' : c.include_email === '0' ? '<div class="hint">Marked "No" in Salesforce</div>' : '<div class="hint">Not set in Salesforce</div>'}
        </div>
      </div>
    </div>

    <div class="button-row">
      ${totalDecided > 0 ? '<button class="btn btn-back" onclick="goBack()">Back</button>' : ''}
      <button class="btn btn-skip" onclick="skipContact()">Skip</button>
      <button class="btn btn-approve" onclick="approveContact()">Approve & Upload</button>
    </div>
  `;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== ACTIONS =====
async function approveContact() {
  const c = sfContacts[currentIndex];
  const name = document.getElementById('inp-name').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const org = document.getElementById('inp-org').value.trim();
  const role = document.getElementById('inp-role').value.trim();
  const communityId = document.getElementById('inp-community').value;
  const active = document.querySelector('input[name="active"]:checked').value === 'true';
  const emailList = document.getElementById('inp-email-list').checked;

  if (!name) { showToast('Name is required', 'error'); return; }

  // Validate email format if provided
  if (email && !email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
    showToast('Invalid email format', 'error');
    return;
  }

  const row = {
    name,
    role: role || '',
    community_id: communityId || null,
    email: email || '',
    phone: phone || '',
    org: org || '',
    active,
    email_list: emailList,
  };

  // Disable button while uploading
  const btn = document.querySelector('.btn-approve');
  btn.textContent = 'Uploading...';
  btn.disabled = true;

  try {
    let { data, error } = await supa.from('contacts').insert(row).select();
    // If email_list column doesn't exist yet, retry without it
    if (error && error.message && error.message.includes('email_list')) {
      const { email_list, ...rowWithout } = row;
      ({ data, error } = await supa.from('contacts').insert(rowWithout).select());
    }
    if (error) throw error;

    approved.push({ ...c, uploaded: data[0] });
    decisions[c.sf_id] = 'approved';
    existingContacts.push(data[0]); // Add to existing for dup detection
    showToast(`${name} uploaded successfully`, 'success');
    showContact(currentIndex + 1);
  } catch (err) {
    showToast('Upload failed: ' + err.message, 'error');
    btn.textContent = 'Approve & Upload';
    btn.disabled = false;
  }
}

function skipContact() {
  const c = sfContacts[currentIndex];
  skipped.push(c);
  decisions[c.sf_id] = 'skipped';
  showContact(currentIndex + 1);
}

function goBack() {
  // Find the previous decided contact
  let prevIndex = currentIndex - 1;
  while (prevIndex >= 0) {
    const c = sfContacts[prevIndex];
    if (decisions[c.sf_id]) {
      // Undo the decision
      if (decisions[c.sf_id] === 'approved') {
        approved = approved.filter(a => a.sf_id !== c.sf_id);
        // Note: we don't delete from Supabase on back - user can skip if they want
      } else {
        skipped = skipped.filter(s => s.sf_id !== c.sf_id);
      }
      delete decisions[c.sf_id];
      currentIndex = prevIndex;
      showContact(prevIndex);
      return;
    }
    prevIndex--;
  }
}

function jumpToAccount() {
  const account = document.getElementById('account-filter').value;
  if (!account) { showContact(currentIndex); return; }
  const idx = sfContacts.findIndex(c => c.account_name === account && !decisions[c.sf_id]);
  if (idx >= 0) showContact(idx);
  else showToast('All contacts from that account have been reviewed', 'error');
}

function searchContact() {
  const q = document.getElementById('search-box').value.toLowerCase().trim();
  if (!q) return;
  const idx = sfContacts.findIndex(c =>
    !decisions[c.sf_id] &&
    ((c.name || '').toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q))
  );
  if (idx >= 0) showContact(idx);
}

// ===== DONE =====
function showDone() {
  document.getElementById('review-card').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';

  const pct = 100;
  document.getElementById('progress-label').textContent = 'All contacts reviewed';
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('count-approved').textContent = approved.length;
  document.getElementById('count-skipped').textContent = skipped.length;
  document.getElementById('count-remaining').textContent = '0';

  const done = document.getElementById('done-section');
  done.style.display = '';
  done.innerHTML = `
    <h2>Migration Complete</h2>
    <p>${approved.length} contacts uploaded to the Sensor Network Tracker</p>
    <p>${skipped.length} contacts skipped</p>
    <p style="margin-top: 16px; color: var(--text);">You can now open the Sensor Tracker app to verify the imported contacts.</p>
  `;

  if (skipped.length > 0) {
    const list = document.getElementById('skipped-list');
    list.style.display = '';
    list.innerHTML = `
      <h3>Skipped Contacts (${skipped.length})</h3>
      <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px;">You can review these again if needed.</p>
      ${skipped.map((c, i) => `
        <div class="skipped-item">
          <div>
            <strong>${c.name}</strong>
            <span style="color: var(--text-dim); margin-left: 8px;">${c.account_name || ''}</span>
            <span style="color: var(--text-dim); margin-left: 8px;">${c.email || ''}</span>
          </div>
          <button class="btn btn-approve" style="padding:6px 14px;font-size:0.8rem;" onclick="reviewSkipped(${i})">Review</button>
        </div>
      `).join('')}
    `;
  }
}

function reviewSkipped(skipIdx) {
  const c = skipped[skipIdx];
  // Remove from skipped, reset decision
  skipped.splice(skipIdx, 1);
  delete decisions[c.sf_id];

  // Find the index in sfContacts
  const idx = sfContacts.findIndex(x => x.sf_id === c.sf_id);

  document.getElementById('review-card').style.display = '';
  document.getElementById('filter-bar').style.display = '';
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('skipped-list').style.display = 'none';

  showContact(idx);
}

// ===== TOAST =====
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// ===== NEW COMMUNITY =====
function openNewCommunityModal() {
  const modal = document.getElementById('new-community-modal');
  modal.classList.remove('hidden');
  document.getElementById('new-comm-name').value = '';
  document.getElementById('new-comm-error').textContent = '';
  document.getElementById('new-comm-id-preview').textContent = '';

  // Populate parent dropdown
  const parentSelect = document.getElementById('new-comm-parent');
  parentSelect.innerHTML = '<option value="">-- None (top-level) --</option>' +
    communities.map(cm => `<option value="${cm.id}">${cm.name}</option>`).join('');

  document.getElementById('new-comm-name').focus();
}

function closeNewCommunityModal() {
  document.getElementById('new-community-modal').classList.add('hidden');
}

function previewCommunityId() {
  const name = document.getElementById('new-comm-name').value.trim();
  const id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  document.getElementById('new-comm-id-preview').textContent = id ? `ID: ${id}` : '';
}

async function saveNewCommunity() {
  const name = document.getElementById('new-comm-name').value.trim();
  const parentId = document.getElementById('new-comm-parent').value;
  const errorEl = document.getElementById('new-comm-error');
  errorEl.textContent = '';

  if (!name) { errorEl.textContent = 'Name is required'; return; }

  const id = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  if (!id) { errorEl.textContent = 'Name must contain at least one letter or number'; return; }

  // Check for duplicates
  if (communities.find(c => c.id === id)) {
    errorEl.textContent = 'A community with that ID already exists';
    return;
  }

  // Save to Supabase
  const btn = document.querySelector('#new-community-modal .btn-approve');
  btn.textContent = 'Adding...';
  btn.disabled = true;

  try {
    const row = { id, name, parent_id: parentId || null };
    const { error } = await supa.from('communities').insert(row);
    if (error) throw error;

    // Add to local list and sort
    communities.push({ id, name, parent_id: parentId || null });
    communities.sort((a, b) => a.name.localeCompare(b.name));

    // Update the community dropdown on the current card
    const select = document.getElementById('inp-community');
    if (select) {
      // Rebuild options
      select.innerHTML = '<option value="">-- No Community --</option>' +
        communities.map(cm => `<option value="${cm.id}" ${cm.id === id ? 'selected' : ''}>${cm.name}</option>`).join('');
    }

    closeNewCommunityModal();
    showToast(`Community "${name}" added and selected`, 'success');
  } catch (err) {
    errorEl.textContent = 'Failed: ' + err.message;
  } finally {
    btn.textContent = 'Add Community';
    btn.disabled = false;
  }
}

// Close modal on Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && !document.getElementById('new-community-modal').classList.contains('hidden')) {
    closeNewCommunityModal();
  }
});

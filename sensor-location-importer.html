<script>
// ===== SUPABASE SETUP =====
const SUPABASE_URL = 'https://uejryzioxogquflijgyf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlanJ5emlveG9ncXVmbGlqZ3lmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTkyODMsImV4cCI6MjA4OTI3NTI4M30.YD349-X2PeoeCTVp34FbzdGwachr9YCpzIPSXuSURfM';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== DATA =====
let importRows = [];       // parsed from paste/file
let existingSensors = [];  // from Supabase
let currentIndex = 0;
let updated = [];
let skippedItems = [];
let noMatchItems = [];
let decisions = {};        // row index -> 'updated' | 'skipped' | 'no-match'

// ===== LOGIN =====
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;

  try {

    // Load existing sensors
    const { data: sensors, error: sErr } = await supa.from('sensors').select('*').order('id');
    if (sErr) throw sErr;
    existingSensors = sensors || [];

    // Auto-load embedded SF data
    importRows = SF_SENSOR_DATA.map((r, i) => ({ ...r, _rowNum: i + 1 }));
    console.log('Loaded', existingSensors.length, 'sensors from DB,', importRows.length, 'from SF');
    showToast(`Signed in. ${existingSensors.length} sensors loaded, ${importRows.length} Salesforce records ready.`, 'success');

// ===== PARSE DATA =====
function parseTSV(text) {
  const lines = text.trim().split('\n').map(l => l.split('\t'));
  if (lines.length < 2) return [];

  const headers = lines[0].map(h => h.trim().toLowerCase());

  // Find column indices by common names
  const sensorIdCol = headers.findIndex(h =>
    h.includes('sensor') || h.includes('mod') || h.includes('device') || h === 'id' || h === 'name'
  );
  const soaCol = headers.findIndex(h =>
    h.includes('soa') || h.includes('tag id') || h.includes('asset tag')
  );
  const purchaseCol = headers.findIndex(h =>
    h.includes('purchase') || h.includes('date purchased') || h.includes('acquired') || h.includes('procurement')
  );

  if (sensorIdCol < 0) {
    showToast('Could not find a Sensor ID column. Make sure your header row includes "Sensor ID" or "MOD".', 'error');
    return [];
  }

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i];
    const sensorId = (cells[sensorIdCol] || '').trim();
    if (!sensorId) continue;

    rows.push({
      sensorId,
      soaTagId: soaCol >= 0 ? (cells[soaCol] || '').trim() : '',
      datePurchased: purchaseCol >= 0 ? (cells[purchaseCol] || '').trim() : '',
      _rowNum: i + 1,
    });
  }
  return rows;
}

function parseCSV(text) {
  // Handle both comma and tab separated
  const firstLine = text.split('\n')[0];
  if (firstLine.includes('\t')) return parseTSV(text);

  const lines = text.trim().split('\n').map(l => {
    // Simple CSV parse (handles quotes)
    const cells = [];
    let current = '';
    let inQuotes = false;
    for (let ch of l) {
      if (ch === '"') { inQuotes = !inQuotes; continue; }
      if (ch === ',' && !inQuotes) { cells.push(current.trim()); current = ''; continue; }
      current += ch;
    }
    cells.push(current.trim());
    return cells;
  });

  if (lines.length < 2) return [];

  const headers = lines[0].map(h => h.toLowerCase());
  const sensorIdCol = headers.findIndex(h =>
    h.includes('sensor') || h.includes('mod') || h.includes('device') || h === 'id' || h === 'name'
  );
  const soaCol = headers.findIndex(h =>
    h.includes('soa') || h.includes('tag id') || h.includes('asset tag')
  );
  const purchaseCol = headers.findIndex(h =>
    h.includes('purchase') || h.includes('date purchased') || h.includes('acquired') || h.includes('procurement')
  );

  if (sensorIdCol < 0) {
    showToast('Could not find a Sensor ID column.', 'error');
    return [];
  }

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i];
    const sensorId = (cells[sensorIdCol] || '').trim();
    if (!sensorId) continue;
    rows.push({
      sensorId,
      soaTagId: soaCol >= 0 ? (cells[soaCol] || '').trim() : '',
      datePurchased: purchaseCol >= 0 ? (cells[purchaseCol] || '').trim() : '',
      _rowNum: i + 1,
    });
  }
  return rows;
}

function parsePastedData() {
  const text = document.getElementById('paste-area').value;
  if (!text.trim()) { showToast('Paste your data first', 'error'); return; }

  importRows = parseCSV(text);
  if (importRows.length === 0) return;

  startReview();
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    importRows = parseCSV(text);
    if (importRows.length > 0) startReview();
  };
  reader.readAsText(file);
}

function matchSensor(sensorId) {
  // Try exact match first
  let match = existingSensors.find(s => s.id === sensorId);
  if (match) return match;

  // Try case-insensitive
  const lower = sensorId.toLowerCase();
  match = existingSensors.find(s => s.id.toLowerCase() === lower);
  if (match) return match;

  // Try partial match (e.g. "456" matches "MOD-00456")
  if (sensorId.match(/^\d+$/)) {
    match = existingSensors.find(s => s.id.includes(sensorId));
    if (match) return match;
  }

  return null;
}

function normalizeDate(dateStr) {
  if (!dateStr) return '';
  // Try various formats
  const d = new Date(dateStr);
  if (!isNaN(d.getTime())) {
    return d.toISOString().split('T')[0]; // YYYY-MM-DD
  }
  // Try MM/DD/YYYY
  const parts = dateStr.split('/');
  if (parts.length === 3) {
    const [m, d2, y] = parts;
    const date = new Date(y, m - 1, d2);
    if (!isNaN(date.getTime())) return date.toISOString().split('T')[0];
  }
  return dateStr; // return as-is if we can't parse
}

function startReview() {
  document.getElementById('review-area').style.display = 'block';
  showSensor(0);
}

// ===== RENDER =====
function showSensor(index) {
  // Skip already-decided
  while (index < importRows.length && decisions[index] !== undefined) {
    index++;
  }
  if (index >= importRows.length) {
    showDone();
    return;
  }
  currentIndex = index;
  const row = importRows[index];
  const match = matchSensor(row.sensorId);

  const totalDecided = updated.length + skippedItems.length + noMatchItems.length;
  const remaining = importRows.length - totalDecided;
  const pct = Math.round((totalDecided / importRows.length) * 100);

  document.getElementById('progress-label').textContent = `Sensor ${totalDecided + 1} of ${importRows.length}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('count-updated').textContent = updated.length;
  document.getElementById('count-skipped').textContent = skippedItems.length;
  document.getElementById('count-nomatch').textContent = noMatchItems.length;
  document.getElementById('count-remaining').textContent = remaining;

  const card = document.getElementById('review-card');
  card.style.display = '';

  // No date normalization needed — collocation dates are free text

  if (!match) {
    // No match found
    card.innerHTML = `
      <div class="no-match-warning">
        No matching sensor found for <strong>${escHtml(row.sensorId)}</strong> in the tracker.
      </div>
      <div class="sf-data">
        <h3>Salesforce Data (${row.sfName || 'Row ' + row._rowNum})</h3>
        <div class="sf-row"><span class="sf-label">SF Name:</span> <span class="sf-value">${escHtml(row.sfName || row.sensorId)}</span></div>
        <div class="sf-row"><span class="sf-label">Mapped Sensor ID:</span> <span class="sf-value" style="font-family:'JetBrains Mono',monospace">${escHtml(row.sensorId)}</span></div>
        <div class="sf-row"><span class="sf-label">Location:</span> <span class="sf-value">${row.location || '<em class="empty">empty</em>'}</span></div>
        <div class="sf-row"><span class="sf-label">Most Recent Collocation:</span> <span class="sf-value">${row.collocationDates || '<em class="empty">empty</em>'}</span></div>
      </div>
      <div class="button-row">
        ${totalDecided > 0 ? '<button class="btn btn-back" onclick="goBack()">Back</button>' : ''}
        <button class="btn btn-skip" onclick="markNoMatch()">No Match — Skip</button>
      </div>
    `;
    return;
  }

  // Matched sensor — show comparison
  const currentLoc = match.location || '';
  const currentColloc = match.collocation_dates || '';
  const newLoc = row.location;
  const newColloc = row.collocationDates;

  const soaChanged = newLoc && newLoc !== currentLoc;
  const dateChanged = newColloc && newColloc !== currentColloc;
  const hasChanges = soaChanged || dateChanged;

  let changeHtml = '';
  if (hasChanges) {
    changeHtml = `<div class="change-preview"><h3>Changes to Apply</h3>`;
    if (soaChanged) {
      changeHtml += `<div class="change-item">
        <span class="field-name">Location:</span>
        ${currentLoc ? `<span class="old-val">${escHtml(currentLoc)}</span> <span class="arrow">&rarr;</span>` : ''}
        <span class="new-val">${escHtml(newLoc)}</span>
      </div>`;
    } else if (newLoc && newLoc === currentLoc) {
      changeHtml += `<div class="change-item"><span class="field-name">Location:</span> <span class="same">Already set to ${escHtml(currentLoc)}</span></div>`;
    }
    if (dateChanged) {
      changeHtml += `<div class="change-item">
        <span class="field-name">Most Recent Collocation:</span>
        ${currentColloc ? `<span class="old-val">${escHtml(currentColloc)}</span> <span class="arrow">&rarr;</span>` : ''}
        <span class="new-val">${escHtml(newColloc)}</span>
      </div>`;
    } else if (newColloc && newColloc === currentColloc) {
      changeHtml += `<div class="change-item"><span class="field-name">Most Recent Collocation:</span> <span class="same">Already set to ${escHtml(currentColloc)}</span></div>`;
    }
    changeHtml += '</div>';
  }

  const alreadySetHtml = !hasChanges ? `<div class="already-set">
    This sensor already has the same data. Nothing to update.
  </div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <h2>${escHtml(match.id)}</h2>
      <span class="match-badge matched">Matched</span>
    </div>

    <div class="sf-data">
      <h3>Salesforce Data (${row.sfName || 'Row ' + row._rowNum})</h3>
      <div class="sf-row"><span class="sf-label">SF Name:</span> <span class="sf-value">${escHtml(row.sfName || row.sensorId)}</span></div>
      <div class="sf-row"><span class="sf-label">Mapped Sensor ID:</span> <span class="sf-value" style="font-family:'JetBrains Mono',monospace">${escHtml(row.sensorId)}</span></div>
      <div class="sf-row"><span class="sf-label">Location:</span> <span class="sf-value">${row.location || '<em class="empty">empty</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Most Recent Collocation:</span> <span class="sf-value">${row.collocationDates || '<em class="empty">empty</em>'}</span></div>
    </div>

    <div class="current-data">
      <h3>Current Sensor Data in Tracker</h3>
      <div class="sf-row"><span class="sf-label">Sensor ID:</span> <span class="sf-value">${escHtml(match.id)}</span></div>
      <div class="sf-row"><span class="sf-label">Type:</span> <span class="sf-value">${escHtml(Array.isArray(match.type) ? match.type.join(', ') : (match.type || '—'))}</span></div>
      <div class="sf-row"><span class="sf-label">Community:</span> <span class="sf-value">${escHtml(match.community_id || '—')}</span></div>
      <div class="sf-row"><span class="sf-label">Location:</span> <span class="sf-value">${currentLoc || '<em class="empty">not set</em>'}</span></div>
      <div class="sf-row"><span class="sf-label">Most Recent Collocation:</span> <span class="sf-value">${currentColloc || '<em class="empty">not set</em>'}</span></div>
    </div>

    ${alreadySetHtml}
    ${changeHtml}

    <div class="form-section">
      <h3>Edit Before Saving (optional)</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="inp-location" value="${escHtml(newLoc || currentLoc)}">
        </div>
        <div class="form-group">
          <label>Most Recent Collocation</label>
          <input type="text" id="inp-collocation" value="${escHtml(newColloc || currentColloc)}">
        </div>
      </div>
    </div>

    <div class="button-row">
      ${totalDecided > 0 ? '<button class="btn btn-back" onclick="goBack()">Back</button>' : ''}
      <button class="btn btn-skip" onclick="skipSensor()">Skip</button>
      <button class="btn btn-approve" onclick="updateSensor('${escHtml(match.id)}')">${hasChanges ? 'Approve & Update' : 'Confirm (No Changes)'}</button>
    </div>
  `;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ===== ACTIONS =====
async function updateSensor(sensorId) {
  const location = document.getElementById('inp-location').value.trim();
  const collocationDates = document.getElementById('inp-collocation').value.trim();

  const updateData = {};
  if (location) updateData.location = location;
  if (collocationDates) updateData.collocation_dates = collocationDates;
  updateData.updated_at = new Date().toISOString();

  const btn = document.querySelector('.btn-approve');
  btn.textContent = 'Updating...';
  btn.disabled = true;

  try {
    if (Object.keys(updateData).length > 1) { // more than just updated_at
      const { error } = await supa.from('sensors').update(updateData).eq('id', sensorId);
      if (error) throw error;

      // Update local data
      const sensor = existingSensors.find(s => s.id === sensorId);
      if (sensor) {
        if (location) sensor.location = location;
        if (collocationDates) sensor.collocation_dates = collocationDates;
      }
    }

    updated.push({ ...importRows[currentIndex], sensorId });
    decisions[currentIndex] = 'updated';
    showToast(`${sensorId} updated`, 'success');
    showSensor(currentIndex + 1);
  } catch (err) {
    showToast('Update failed: ' + err.message, 'error');
    btn.textContent = 'Approve & Update';
    btn.disabled = false;
  }
}

function skipSensor() {
  skippedItems.push(importRows[currentIndex]);
  decisions[currentIndex] = 'skipped';
  showSensor(currentIndex + 1);
}

function markNoMatch() {
  noMatchItems.push(importRows[currentIndex]);
  decisions[currentIndex] = 'no-match';
  showSensor(currentIndex + 1);
}

function goBack() {
  let prevIndex = currentIndex - 1;
  while (prevIndex >= 0) {
    if (decisions[prevIndex] !== undefined) {
      const decision = decisions[prevIndex];
      if (decision === 'updated') updated = updated.filter(u => u._rowNum !== importRows[prevIndex]._rowNum);
      else if (decision === 'skipped') skippedItems = skippedItems.filter(s => s._rowNum !== importRows[prevIndex]._rowNum);
      else if (decision === 'no-match') noMatchItems = noMatchItems.filter(n => n._rowNum !== importRows[prevIndex]._rowNum);
      delete decisions[prevIndex];
      currentIndex = prevIndex;
      showSensor(prevIndex);
      return;
    }
    prevIndex--;
  }
}

function searchSensor() {
  const q = document.getElementById('search-box').value.toLowerCase().trim();
  if (!q) return;
  const idx = importRows.findIndex((r, i) =>
    decisions[i] === undefined && r.sensorId.toLowerCase().includes(q)
  );
  if (idx >= 0) showSensor(idx);
}

function applyShowFilter() {
  const filter = document.getElementById('show-filter').value;
  const idx = importRows.findIndex((r, i) => {
    if (decisions[i] !== undefined) return false;
    if (filter === 'all') return true;
    const match = matchSensor(r.sensorId);
    if (filter === 'matched') return !!match;
    if (filter === 'no-match') return !match;
    if (filter === 'has-changes') {
      if (!match) return false;
      const newLoc = r.location;
      const newColloc = r.collocationDates;
      return (newLoc && newLoc !== (match.location || '')) ||
             (newColloc && newColloc !== (match.collocation_dates || ''));
    }
    return true;
  });
  if (idx >= 0) showSensor(idx);
  else showToast('No matching undecided sensors for that filter', 'error');
}

// ===== DONE =====
function showDone() {
  document.getElementById('review-card').style.display = 'none';
  document.getElementById('filter-bar').style.display = 'none';

  document.getElementById('progress-label').textContent = 'All sensors reviewed';
  document.getElementById('progress-pct').textContent = '100%';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('count-updated').textContent = updated.length;
  document.getElementById('count-skipped').textContent = skippedItems.length;
  document.getElementById('count-nomatch').textContent = noMatchItems.length;
  document.getElementById('count-remaining').textContent = '0';

  const done = document.getElementById('done-section');
  done.style.display = '';
  done.innerHTML = `
    <h2>Import Complete</h2>
    <p>${updated.length} sensor${updated.length !== 1 ? 's' : ''} updated</p>
    <p>${skippedItems.length} skipped</p>
    <p>${noMatchItems.length} had no match</p>
    <p style="margin-top: 16px; color: var(--text);">You can now open the Sensor Tracker app to verify the imported data.</p>
  `;

  const list = document.getElementById('skipped-list');
  if (skippedItems.length > 0 || noMatchItems.length > 0) {
    list.style.display = '';
    let html = '';

    if (skippedItems.length > 0) {
      html += `
        <h3>Skipped Sensors (${skippedItems.length})</h3>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px;">You can review these again if needed.</p>
        ${skippedItems.map((s, i) => `
          <div class="skipped-item">
            <div>
              <strong style="font-family:'JetBrains Mono',monospace">${escHtml(s.sensorId)}</strong>
              <span style="color: var(--text-dim); margin-left: 8px;">Loc: ${escHtml(s.location || '—')}</span>
              <span style="color: var(--text-dim); margin-left: 8px;">Colloc: ${escHtml(s.collocationDates || '—')}</span>
            </div>
            <button class="btn btn-approve" style="padding:6px 14px;font-size:0.8rem;" onclick="reviewSkipped(${i})">Review</button>
          </div>
        `).join('')}
      `;
    }

    if (noMatchItems.length > 0) {
      html += `
        <h3 style="color: var(--red); ${skippedItems.length > 0 ? 'margin-top: 24px;' : ''}">No Match (${noMatchItems.length})</h3>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px;">These sensor IDs didn't match any sensor in the tracker. Review to try again or skip.</p>
        ${noMatchItems.map((s, i) => `
          <div class="skipped-item">
            <div>
              <strong style="font-family:'JetBrains Mono',monospace">${escHtml(s.sensorId)}</strong>
              <span style="color: var(--text-dim); margin-left: 8px;">SF: ${escHtml(s.sfName || '')}</span>
              <span style="color: var(--text-dim); margin-left: 8px;">Loc: ${escHtml(s.location || '—')}</span>
            </div>
            <button class="btn btn-approve" style="padding:6px 14px;font-size:0.8rem;" onclick="reviewNoMatch(${i})">Review</button>
          </div>
        `).join('')}
      `;
    }

    list.innerHTML = html;
  }
}

function reviewSkipped(skipIdx) {
  const s = skippedItems[skipIdx];
  skippedItems.splice(skipIdx, 1);

  const idx = importRows.findIndex(r => r._rowNum === s._rowNum);
  delete decisions[idx];

  document.getElementById('review-card').style.display = '';
  document.getElementById('filter-bar').style.display = '';
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('skipped-list').style.display = 'none';

  showSensor(idx);
}

function reviewNoMatch(nmIdx) {
  const s = noMatchItems[nmIdx];
  noMatchItems.splice(nmIdx, 1);

  const idx = importRows.findIndex(r => r._rowNum === s._rowNum);
  delete decisions[idx];

  document.getElementById('review-card').style.display = '';
  document.getElementById('filter-bar').style.display = '';
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('skipped-list').style.display = 'none';

  showSensor(idx);
}

// ===== TOAST =====
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}
